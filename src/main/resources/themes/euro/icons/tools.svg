<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Screwdriver handle -->
  <rect x="2" y="10" width="3" height="4" rx="0.5" fill="#ff0000" stroke="#404040" stroke-width="0.8"/>
  <!-- Screwdriver metal shaft -->
  <line x1="3.5" y1="10" x2="3.5" y2="5" stroke="#808080" stroke-width="1.2"/>
  <!-- Screwdriver tip -->
  <line x1="2.5" y1="5" x2="4.5" y2="5" stroke="#404040" stroke-width="0.8"/>

  <!-- Wrench (overlapping diagonally) -->
  <path d="M12.5 1.5l1.5 1.5-6.5 6.5-1.5-1.5z" fill="#c0c0c0" stroke="#404040" stroke-width="0.8"/>
  <!-- Wrench C-head -->
  <circle cx="13" cy="2" r="2.2" fill="#c0c0c0" stroke="#404040" stroke-width="0.8"/>
  <!-- Cutout for wrench mouth -->
  <path d="M14 1l-2 2" stroke="#404040" stroke-width="1"/>
</svg>
