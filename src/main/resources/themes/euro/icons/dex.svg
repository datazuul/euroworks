<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Rolodex or index card organizer -->
  <rect x="2" y="4" width="12" height="10" rx="1" fill="#e2e8f0" stroke="#718096" stroke-width="0.8"/>
  <rect x="3" y="2" width="10" height="2" fill="#a0aec0" rx="0.5"/>
  <!-- Index card layers -->
  <line x1="4" y1="7" x2="12" y2="7" stroke="#3182ce" stroke-width="1.2"/>
  <line x1="4" y1="10" x2="10" y2="10" stroke="#4a5568" stroke-width="1"/>
  <line x1="4" y1="12" x2="8" y2="12" stroke="#a0aec0" stroke-width="1"/>
</svg>
