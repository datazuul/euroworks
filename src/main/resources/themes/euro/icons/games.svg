<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Joystick Base (3D look) -->
  <rect x="2" y="9" width="12" height="5" rx="1.5" fill="#c0c0c0" stroke="#404040" stroke-width="1"/>
  <!-- Action Buttons -->
  <circle cx="5" cy="11.5" r="1.2" fill="#ff0000" stroke="#404040" stroke-width="0.5"/>
  <circle cx="8" cy="11.5" r="1.2" fill="#ff0000" stroke="#404040" stroke-width="0.5"/>
  <!-- Joystick Shaft -->
  <path d="M10 9.5V4.5" fill="none" stroke="#404040" stroke-width="1.8"/>
  <!-- Joystick Knob -->
  <circle cx="10" cy="3.5" r="2" fill="#ff0000" stroke="#404040" stroke-width="0.5"/>
</svg>
